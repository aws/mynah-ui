name: 'Test Report'
on: workflow_call
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - uses: dorny/test-reporter@v2.5.0
      with:
        name: E2E Tests Report
        artifact: test-results
        path: ./__reports__/junit.xml
        reporter: jest-junit
        fail-on-error: false